name: Python tests & acceptance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: music_api
          POSTGRES_PASSWORD: music_api_password
          POSTGRES_DB: music_stream_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U music_api -d music_stream_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://music_api:music_api_password@localhost:5432/music_stream_dev
      API_BASE_URL: http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio

      - name: Run Python unit tests
        working-directory: python
        run: pytest tests/ --junitxml=pytest-results.xml

      - name: Publish Python test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Python unit tests
          path: python/pytest-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Start Python API server
        working-directory: python
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8080 > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/docs > /dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 1
          done
          echo "API did not start in time"
          cat python/server.log || true
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: acceptance/package-lock.json

      - name: Install acceptance dependencies
        working-directory: acceptance
        run: npm ci

      - name: Run acceptance tests
        working-directory: acceptance
        run: npx cucumber-js --format "junit:cucumber-results.xml" --format "html:cucumber-report.html" --format progress

      - name: Publish acceptance test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Acceptance tests
          path: acceptance/cucumber-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload acceptance HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: acceptance/cucumber-report.html

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: python/server.log

      - name: Stop API server
        if: always()
        working-directory: python
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
