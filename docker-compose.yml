version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lang-compare-postgres
    environment:
      POSTGRES_USER: music_api
      POSTGRES_PASSWORD: music_api_password
      POSTGRES_DB: music_stream_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_api -d music_stream_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
